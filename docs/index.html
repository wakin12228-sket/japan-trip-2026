<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a365d">
  <title>2026 家族日本之旅</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #1a202c;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --border: #e2e8f0;
      --timeline: #cbd5e1;
      --dot: #2563eb;
      --tab-active: #1e40af;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      padding-bottom: calc(1rem + var(--safe-bottom));
    }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: #fff;
      padding: 1.25rem 1rem 1rem;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .header p {
      font-size: .875rem;
      opacity: .85;
      margin-top: .25rem;
    }

    .tabs-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 4.5rem;
      z-index: 15;
      box-shadow: var(--shadow);
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: .5rem .75rem;
      gap: .5rem;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      scroll-snap-align: start;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 999px;
      padding: .45rem .85rem;
      font-size: .8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      color: var(--muted);
    }

    .tab.has-content { color: var(--text); }

    .tab.active {
      background: var(--tab-active);
      border-color: var(--tab-active);
      color: #fff;
      font-weight: 600;
    }

    .tab .dow { opacity: .75; margin-left: .15rem; }

    main { max-width: 720px; margin: 0 auto; padding: 1rem; }

    .day-header {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .day-header .label {
      font-size: .75rem;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .day-header h2 {
      font-size: 1.1rem;
      margin-top: .35rem;
      line-height: 1.4;
    }

    .day-header .hotel {
      margin-top: .6rem;
      font-size: .85rem;
      color: var(--muted);
    }

    .day-header .hotel::before { content: "🏨 "; }

    .hotels-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .hotels-card h3 {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .75rem;
      font-weight: 600;
    }

    .hotel-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: .75rem;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
    }

    .hotel-row:last-child { border-bottom: none; }

    .hotel-row .dates {
      flex-shrink: 0;
      font-size: .8rem;
      color: var(--muted);
    }

    .hotel-row a {
      color: var(--accent);
      text-decoration: none;
      font-size: .8rem;
      margin-top: .2rem;
      display: inline-block;
    }

    .timeline { position: relative; padding-left: 1.5rem; }

    .timeline::before {
      content: "";
      position: absolute;
      left: .45rem;
      top: .5rem;
      bottom: .5rem;
      width: 2px;
      background: var(--timeline);
    }

    .item {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      padding: .9rem 1rem;
      margin-bottom: .75rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .item::before {
      content: "";
      position: absolute;
      left: -1.28rem;
      top: 1.1rem;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--dot);
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    .section-label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: .5rem;
      letter-spacing: .04em;
    }

    .item-time {
      font-size: .8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: .35rem;
    }

    .item-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: .4rem;
    }

    .item-location {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    .item-transport,
    .item-duration {
      font-size: .82rem;
      background: var(--accent-soft);
      color: #1e40af;
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 6px;
      margin: .15rem .35rem .15rem 0;
    }

    .item-notes {
      font-size: .875rem;
      color: #334155;
      margin-top: .5rem;
      white-space: pre-wrap;
    }

    .map-link {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      margin-top: .55rem;
      font-size: .82rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .map-link:hover { text-decoration: underline; }

    .empty-day {
      min-height: 40vh;
    }

    .loading, .error {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .error { color: #dc2626; }

    @media (min-width: 640px) {
      .header { padding: 1.5rem 1.5rem 1.25rem; }
      .header h1 { font-size: 1.5rem; }
      .tabs-wrap { top: 5.25rem; }
      main { padding: 1.25rem 1.5rem 2rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 id="trip-title">載入中…</h1>
    <p id="trip-subtitle"></p>
  </header>

  <div class="tabs-wrap">
    <nav class="tabs" id="tabs" aria-label="選擇日期"></nav>
  </div>

  <main id="main">
    <p class="loading">載入行程中…</p>
  </main>

  <script>
    let data = null;
    let activeDay = 1;

    function mapsUrl(query) {
      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(query);
    }

    function formatDateShort(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return (d.getMonth() + 1) + "/" + d.getDate();
    }

    function formatTime(item) {
      if (item.endTime) return item.time + " – " + item.endTime;
      return item.time;
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = data.days.map(function (day) {
        const hasContent = day.items && day.items.length > 0;
        const cls = ["tab", activeDay === day.day ? "active" : "", hasContent ? "has-content" : ""].filter(Boolean).join(" ");
        return (
          '<button type="button" class="' + cls + '" data-day="' + day.day + '">' +
          "Day " + day.day + " · " + formatDateShort(day.date) +
          '<span class="dow">(' + day.weekday + ")</span></button>"
        );
      }).join("");

      tabs.querySelectorAll(".tab").forEach(function (btn) {
        btn.addEventListener("click", function () {
          activeDay = Number(btn.dataset.day);
          renderTabs();
          renderDay();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });

      const activeBtn = tabs.querySelector('[data-day="' + activeDay + '"]');
      if (activeBtn) activeBtn.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
    }

    function renderHotels() {
      if (!data.essentials || !data.essentials.hotels || !data.essentials.hotels.length) return "";
      const rows = data.essentials.hotels.map(function (h) {
        const map = h.mapQuery
          ? '<a href="' + mapsUrl(h.mapQuery) + '" target="_blank" rel="noopener">地圖</a>'
          : "";
        const ja = h.nameJa ? "（" + h.nameJa + "）" : "";
        return (
          '<div class="hotel-row">' +
          '<div><strong>' + h.name + ja + "</strong>" + (map ? "<br>" + map : "") + "</div>" +
          '<div class="dates">' + h.dates + "</div></div>"
        );
      }).join("");
      return '<div class="hotels-card"><h3>住宿一覽</h3>' + rows + "</div>";
    }

    function renderItem(item) {
      let html = '<article class="item">';
      if (item.section) html += '<div class="section-label">' + item.section + "</div>";
      html += '<div class="item-time">' + formatTime(item) + "</div>";
      html += '<div class="item-title">' + item.title + "</div>";
      if (item.location) html += '<div class="item-location">📍 ' + item.location + "</div>";
      if (item.transport) html += '<span class="item-transport">🚇 ' + item.transport + "</span>";
      if (item.duration) html += '<span class="item-duration">⏱ ' + item.duration + "</span>";
      if (item.notes) html += '<div class="item-notes">' + item.notes + "</div>";
      if (item.mapQuery) {
        html += '<a class="map-link" href="' + mapsUrl(item.mapQuery) + '" target="_blank" rel="noopener">🗺 在 Google Maps 開啟</a>';
      }
      html += "</article>";
      return html;
    }

    function renderDay() {
      const main = document.getElementById("main");
      const day = data.days.find(function (d) { return d.day === activeDay; });
      if (!day) return;

      let html = "";

      if (activeDay === 1) html += renderHotels();

      html += '<div class="day-header">';
      html += '<div class="label">Day ' + day.day + " · " + formatDateShort(day.date) + "（" + day.weekday + "）</div>";
      if (day.title) html += "<h2>" + day.title + "</h2>";
      if (day.hotel) html += '<div class="hotel">' + day.hotel + "</div>";
      html += "</div>";

      if (!day.items || !day.items.length) {
        html += '<div class="empty-day"></div>';
      } else {
        html += '<div class="timeline">';
        html += day.items.map(renderItem).join("");
        html += "</div>";
      }

      main.innerHTML = html;
    }

    async function init() {
      try {
        const res = await fetch("data/itinerary.json");
        if (!res.ok) throw new Error("無法載入行程資料");
        data = await res.json();

        document.getElementById("trip-title").textContent = data.meta.title;
        document.getElementById("trip-subtitle").textContent = data.meta.subtitle || "";
        document.title = data.meta.title;

        const firstWithContent = data.days.find(function (d) { return d.items && d.items.length; });
        if (firstWithContent) activeDay = firstWithContent.day;

        renderTabs();
        renderDay();
      } catch (err) {
        document.getElementById("main").innerHTML =
          '<p class="error">載入失敗：' + err.message + "<br><br>請用本地伺服器預覽，例如在 src 目錄執行：<code>python3 -m http.server 8080</code></p>";
      }
    }

    init();
  </script>
</body>
</html>
